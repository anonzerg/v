name: Build wheels

on:
  workflow_dispatch:
    inputs:
      package-dir:
        type: string
        required: false
        default: ./python
      output-dir:
        type: string
        required: false
        default: wheelhouse
      cibw-build:
        type: string
        required: false
        default: ""
      cibw-skip:
        type: string
        required: false
        default: "*-musllinux_*"
      upload-artifact:
        type: boolean
        required: false
        default: true
  workflow_call:
    inputs:
      package-dir:
        type: string
        required: false
        default: ./python
      output-dir:
        type: string
        required: false
        default: wheelhouse
      cibw-build:
        type: string
        required: false
        default: ""
      cibw-skip:
        type: string
        required: false
        default: "*-musllinux_*"
      upload-artifact:
        type: boolean
        required: false
        default: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Export git metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "VMOL_GIT_HASH=${{ github.sha }}" >> "$GITHUB_ENV"
          echo "VMOL_GIT_BRANCH=${{ github.ref_name }}" >> "$GITHUB_ENV"
          echo "VMOL_GIT_DESCRIBE=$(git describe --tags --dirty 2>/dev/null || true)" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.0

      - name: Build wheels
        run: python -m cibuildwheel "${{ inputs.package-dir }}" --output-dir "${{ inputs.output-dir }}"
        env:
          CIBW_BUILD: ${{ inputs.cibw-build }}
          CIBW_SKIP: ${{ inputs.cibw-skip }}
          CIBW_BEFORE_ALL_MACOS: |
            brew install libx11 libxpm pkg-config
          CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15.0
          CIBW_REPAIR_WHEEL_COMMAND_MACOS: >
            DYLD_LIBRARY_PATH=$(brew --prefix)/lib
            delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}
          CIBW_BEFORE_ALL_LINUX: |
            if [ -f /etc/alpine-release ]; then # musllinux (Alpine)
              apk add --no-cache libx11-dev libxpm-dev pkgconf
            else # manylinux (AlmaLinux)
              /usr/bin/dnf -y install libX11-devel libXpm-devel pkgconf-pkg-config
            fi

      - name: Build cdist
        run: python -m build "${{ inputs.package-dir }}" --sdist --outdir "${{ inputs.output-dir }}"

      - name: Upload wheels
        if: ${{ inputs.upload-artifact }}
        uses: actions/upload-artifact@v6
        with:
          name: vmol-wheels-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_number }}
          path: |
            ${{ inputs.output-dir }}/*.whl
            ${{ inputs.output-dir }}/*.tar.gz
          if-no-files-found: error
