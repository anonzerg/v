name: Build

on: [push, pull_request]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Export git metadata
        shell: bash
        run: |
          set -euo pipefail
          echo "VMOL_GIT_HASH=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "VMOL_GIT_BRANCH=$(git rev-parse --abbrev-ref HEAD)" >> "$GITHUB_ENV"
          DESC="$(git describe --tags --dirty 2>/dev/null || true)"
          echo "VMOL_GIT_DESCRIBE=${DESC}" >> "$GITHUB_ENV"
          # ${{ github.sha }} (commit hash)
          # ${{ github.ref_name }} (branch or tag name for the workflow run)

      - uses: actions/setup-python@v6

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel==3.4.0

      - name: Build wheels
        working-directory: ./python
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BEFORE_ALL_LINUX: |
            if [ -f /etc/alpine-release ]; then # musllinux (Alpine)
              apk add --no-cache libx11-dev libxpm-dev pkgconf
            else # manylinux (AlmaLinux)
              /usr/bin/dnf -y install libX11-devel libXpm-devel pkgconf-pkg-config
            fi

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./python/wheelhouse/*.whl
