name: release

on: # triggered by push tagged commits
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build_wheels:
    uses: ./.github/workflows/wheels.yml

  build_exe:
    name: Build the executable file and shared library for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:

      - name: install X11 dependencies
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt install -y libx11-dev libxpm-dev x11proto-dev

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - run: make v v.so

      - uses: actions/upload-artifact@v6
        with:
          path: |
            ./v
            ./v.so
          name: ${{ matrix.os }}.exe
          if-no-files-found: error


  release:

    needs: [build_wheels, build_exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: ./wheelhouse

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./wheelhouse/**/*.whl
            ./wheelhouse/**/v
            ./wheelhouse/**/v.so

          body_path: .github/CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
